version: "3.8"
services:
  webhook-relay:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ENABLED_PLUGINS=slack,email,logger
      - SLACK_WEBHOOK_URL=https://hooks.slack.com/services/mock
      - EMAIL_API_URL=http://localhost:3001/send
      - RETRY_ATTEMPTS=3
